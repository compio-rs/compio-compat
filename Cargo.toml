[package]
name = "compio-compat"
version = "0.1.0-rc.1"
edition = "2024"

[dependencies]
compio = { version = "0.19.0-rc.1", default-features = false, features = [
    "runtime",
] }
compio-log = "0.1.0"

cfg-if = "1.0.4"
mod_use = "0.2.3"

[target.'cfg(windows)'.dependencies]
flume = "0.12.0"
windows-sys = { version = "0.61.2", features = ["Win32_System_Threading"] }

[features]
futures = []
tokio = []
smol = []
enable_log = ["compio-log/enable_log"]
