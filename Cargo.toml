[workspace]
resolver = "3"

[workspace.dependencies]
compio = { version = "0.19.0-rc.1", default-features = false }
tokio = "1"
futures-executor = "0.3"
smol = "2"

[package]
name = "compio-compat"
version = "0.1.0-rc.1"
edition = "2024"

[dependencies]
compio = { workspace = true, default-features = false, features = ["runtime"] }
compio-log = "0.1.0"

cfg-if = "1.0.4"
mod_use = "0.2.3"
pin-project-lite = "0.2.7"

[target.'cfg(windows)'.dependencies]
flume = "0.12.0"
windows-sys = { version = "0.61.2", features = ["Win32_System_Threading"] }

[dev-dependencies]
compio = { workspace = true, default-features = false, features = ["fs"] }

tokio = { workspace = true, features = ["rt", "macros", "fs", "io-util"] }
futures-executor = { workspace = true }
smol = { workspace = true }

[features]
futures = []
tokio = []
smol = []
enable_log = ["compio-log/enable_log"]
